<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUMS Lost &amp; Found</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="has-sidebar">

    <!-- ── Navigation bar ──────────────────────────────────────────────────── -->
    <nav class="navbar">
        <div class="container">
            <!-- Hamburger button: only visible on mobile, toggles the sidebar -->
            <button class="sidebar-toggle" onclick="toggleSidebar()" aria-label="Open menu">&#9776;</button>
            <a href="index.html" class="nav-brand">LUMS <span>Lost &amp; Found</span></a>
            <div class="nav-links" id="nav-links"></div>
        </div>
    </nav>

    <!-- ── Sidebar ──────────────────────────────────────────────────────────── -->
    <!-- Filled by updateSidebar() in auth.js, called from updateNav()         -->
    <aside class="sidebar" id="sidebar">
        <nav id="sidebar-nav"></nav>
    </aside>

    <!-- ── Main content ────────────────────────────────────────────────────── -->
    <main class="page-content">
        <div class="container">

            <!-- Page heading -->
            <div class="page-header">
                <h1>Lost &amp; Found Board</h1>
                <p>Browse lost and found items across LUMS campus. Find yours or help a fellow student.</p>
            </div>

            <!-- Search & filter form                                           -->
            <!-- Submitting reloads items via handleSearch() in app.js         -->
            <!-- Changing a select also triggers handleSearch() automatically  -->
            <form id="search-form" class="search-bar">

                <!-- Keyword search: searches title AND description -->
                <input
                    type="text"
                    id="search-q"
                    placeholder="Search by keyword (e.g. laptop, wallet, blue bag...)"
                    autocomplete="off"
                >

                <!-- Type filter -->
                <select id="filter-type">
                    <option value="">All Types</option>
                    <option value="lost">Lost Items</option>
                    <option value="found">Found Items</option>
                </select>

                <!-- Category filter -->
                <select id="filter-category">
                    <option value="">All Categories</option>
                    <option value="Electronics">Electronics</option>
                    <option value="ID Card">ID Card</option>
                    <option value="Keys">Keys</option>
                    <option value="Wallet">Wallet</option>
                    <option value="Bag">Bag</option>
                    <option value="Accessories">Accessories</option>
                    <option value="Clothing">Clothing</option>
                    <option value="Books">Books</option>
                    <option value="Other">Other</option>
                </select>

                <!-- Status filter — "open" by default, can switch to resolved or all -->
                <select id="filter-status">
                    <option value="open">Open Items</option>
                    <option value="resolved">Resolved</option>
                    <option value="">All Items</option>
                </select>

                <button type="submit" class="btn btn-primary">Search</button>
            </form>

            <!-- Result count ("6 items found") — set by app.js -->
            <p id="result-count" class="text-muted mt-1" style="font-size: 0.88rem;"></p>

            <!-- Items grid — populated by renderItems() in app.js -->
            <div id="items-container" class="items-grid">
                <div class="spinner"></div>
            </div>

            <!-- Pagination controls — populated by renderPagination() in app.js -->
            <div id="pagination" class="pagination"></div>

        </div>
    </main>

    <!-- Scripts must load in this order:                                       -->
    <!--   api.js   — fetch helpers (no DOM deps)                              -->
    <!--   auth.js  — getCurrentUser, updateNav, escapeHtml (uses api.js)      -->
    <!--   app.js   — page logic (uses both api.js and auth.js)                -->
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
    <script>
        // Toggle sidebar open/closed on mobile (class on body triggers the CSS)
        function toggleSidebar() {
            document.body.classList.toggle("sidebar-open");
        }
        // Clicking the dim overlay (the ::after pseudo-element) closes the sidebar
        document.addEventListener("click", function(e) {
            if (document.body.classList.contains("sidebar-open")) {
                const sidebar = document.getElementById("sidebar");
                if (!sidebar.contains(e.target) && !e.target.closest(".sidebar-toggle")) {
                    document.body.classList.remove("sidebar-open");
                }
            }
        });
    </script>
</body>
</html>
