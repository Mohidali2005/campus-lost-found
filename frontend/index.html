<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUMS Lost &amp; Found</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="has-sidebar">

    <!-- ── Navigation bar ──────────────────────────────────────────────────── -->
    <nav class="navbar">
        <div class="container">
            <button class="sidebar-toggle" onclick="toggleSidebar()" aria-label="Open menu">&#9776;</button>
            <a href="index.html" class="nav-brand">LUMS <span>Lost &amp; Found</span></a>
            <div class="nav-links" id="nav-links"></div>
        </div>
    </nav>

    <!-- ── Sidebar ──────────────────────────────────────────────────────────── -->
    <aside class="sidebar" id="sidebar">
        <nav id="sidebar-nav"></nav>
    </aside>

    <!-- ── Main content ─────────────────────────────────────────────────────── -->
    <main class="page-content">
        <div class="container">

            <!-- Heading — updated by renderItems() based on the active section -->
            <div class="page-header">
                <h1 id="page-heading">Lost &amp; Found Board</h1>
                <p id="page-subtitle">Browse lost and found items across LUMS campus.</p>
            </div>

            <!-- Search bar — keyword + category only.
                 Section (Lost / Found / All) is handled by the sidebar links. -->
            <form id="search-form" class="search-bar">

                <input
                    type="text"
                    id="search-q"
                    placeholder="Search by keyword (e.g. laptop, wallet, blue bag...)"
                    autocomplete="off"
                >

                <select id="filter-category">
                    <option value="">All Categories</option>
                    <option value="Electronics">Electronics</option>
                    <option value="ID Card">ID Card</option>
                    <option value="Keys">Keys</option>
                    <option value="Wallet">Wallet</option>
                    <option value="Bag">Bag</option>
                    <option value="Accessories">Accessories</option>
                    <option value="Clothing">Clothing</option>
                    <option value="Books">Books</option>
                    <option value="Other">Other</option>
                </select>

                <button type="submit" class="btn btn-primary">Search</button>
            </form>

            <p id="result-count" class="text-muted mt-1" style="font-size: 0.88rem;"></p>

            <div id="items-container" class="items-grid">
                <div class="spinner"></div>
            </div>

            <div id="pagination" class="pagination"></div>

        </div>
    </main>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
    <script>
        function toggleSidebar() { document.body.classList.toggle("sidebar-open"); }
        document.addEventListener("click", function(e) {
            if (document.body.classList.contains("sidebar-open")) {
                const sidebar = document.getElementById("sidebar");
                if (!sidebar.contains(e.target) && !e.target.closest(".sidebar-toggle")) {
                    document.body.classList.remove("sidebar-open");
                }
            }
        });
    </script>
</body>
</html>
